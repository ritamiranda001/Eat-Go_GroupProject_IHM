<!-- 
  login.page.html
  Página de Login e Registo da app Eat&Go.
  Requisito 6: Utilizar ícones da framework (Ionicons)
  Requisito 11: Estruturar/Disponibilizar conteúdos através dos Ionic Components
-->

<ion-content class="login-content">
  <div class="login-container">

    <!-- Card principal do login -->
    <div class="login-card">

      <!-- Botão voltar + fechar -->
      <div class="login-top-row">
        <ion-button fill="clear" class="voltar-btn" (click)="voltar()">
          <ion-icon name="arrow-back-outline" slot="start"></ion-icon>
          Voltar
        </ion-button>
        <ion-button fill="clear" class="fechar-btn" (click)="voltar()">
          <ion-icon name="close-outline" slot="icon-only"></ion-icon>
        </ion-button>
      </div>

      <!-- Título -->
      <div class="login-header">
        <h1 class="login-title">
          {{ modo === 'login' ? 'Entrar na sua conta' : 'Criar conta' }}
        </h1>
        <p class="login-subtitle">
          {{ modo === 'login' ? 'Aceda à sua conta para continuar' : 'Registe-se para começar' }}
        </p>
      </div>

      <!-- Formulário de Login -->
      <div class="login-form" *ngIf="modo === 'login'">

        <!-- Campo Email -->
        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="input-wrapper">
            <ion-icon name="mail-outline" class="input-icon"></ion-icon>
            <input
              type="email"
              [(ngModel)]="email"
              placeholder="seu@email.com"
              class="form-input"
            />
          </div>
        </div>

        <!-- Campo Palavra-passe -->
        <div class="form-group">
          <label class="form-label">Palavra-passe</label>
          <div class="input-wrapper">
            <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
            <input
              [type]="mostrarPalavraPasse ? 'text' : 'password'"
              [(ngModel)]="palavraPasse"
              placeholder="••••••••"
              class="form-input"
            />
            <ion-icon
              [name]="mostrarPalavraPasse ? 'eye-off-outline' : 'eye-outline'"
              class="input-icon-right"
              (click)="togglePalavraPasse()">
            </ion-icon>
          </div>
        </div>

        <!-- Lembrar-me + Esqueceu a palavra-passe -->
        <div class="form-options">
          <div class="lembrar-wrapper">
            <input type="checkbox" [(ngModel)]="lembrarMe" id="lembrarMe"/>
            <label for="lembrarMe">Lembrar-me</label>
          </div>
          <span class="esqueceu-link">Esqueceu a palavra-passe?</span>
        </div>

        <!-- Botão Entrar -->
        <ion-button
          expand="block"
          class="entrar-btn"
          (click)="entrar()">
          <ion-icon name="log-in-outline" slot="start"></ion-icon>
          Entrar
        </ion-button>

        <!-- Link para criar conta -->
        <p class="criar-conta-texto">
          Ainda não tem conta?
          <span class="criar-conta-link" (click)="toggleModo()">Criar conta</span>
        </p>

      </div>

      <!-- Formulário de Registo -->
      <div class="login-form" *ngIf="modo === 'registo'">

        <!-- Campo Nome -->
        <div class="form-group">
          <label class="form-label">Nome</label>
          <div class="input-wrapper">
            <ion-icon name="person-outline" class="input-icon"></ion-icon>
            <input
              type="text"
              [(ngModel)]="nome"
              placeholder="O seu nome"
              class="form-input"
            />
          </div>
        </div>

        <!-- Campo Email -->
        <div class="form-group">
          <label class="form-label">Email</label>
          <div class="input-wrapper">
            <ion-icon name="mail-outline" class="input-icon"></ion-icon>
            <input
              type="email"
              [(ngModel)]="email"
              placeholder="seu@email.com"
              class="form-input"
            />
          </div>
        </div>

        <!-- Campo Palavra-passe -->
        <div class="form-group">
          <label class="form-label">Palavra-passe</label>
          <div class="input-wrapper">
            <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
            <input
              [type]="mostrarPalavraPasse ? 'text' : 'password'"
              [(ngModel)]="palavraPasse"
              placeholder="••••••••"
              class="form-input"
            />
            <ion-icon
              [name]="mostrarPalavraPasse ? 'eye-off-outline' : 'eye-outline'"
              class="input-icon-right"
              (click)="togglePalavraPasse()">
            </ion-icon>
          </div>
        </div>

        <!-- Campo Confirmar Palavra-passe -->
        <div class="form-group">
          <label class="form-label">Confirmar Palavra-passe</label>
          <div class="input-wrapper">
            <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
            <input
              [type]="mostrarPalavraPasse ? 'text' : 'password'"
              [(ngModel)]="confirmarPalavraPasse"
              placeholder="••••••••"
              class="form-input"
            />
          </div>
        </div>

        <!-- Botão Criar Conta -->
        <ion-button
          expand="block"
          class="entrar-btn"
          (click)="registar()">
          <ion-icon name="person-add-outline" slot="start"></ion-icon>
          Criar Conta
        </ion-button>

        <!-- Link para login -->
        <p class="criar-conta-texto">
          Já tem conta?
          <span class="criar-conta-link" (click)="toggleModo()">Entrar</span>
        </p>

      </div>

    </div>
  </div>
</ion-content>
