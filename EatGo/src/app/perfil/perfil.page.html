<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-button (click)="voltar()">
        <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>O meu perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="perfil-content">

  <!-- Avatar e nome -->
  <div class="perfil-header">
    <div class="avatar">
      <span class="avatar-iniciais">{{ getIniciais() }}</span>
    </div>
    <h1 class="perfil-nome">{{ utilizador?.nome }}</h1>
    <p class="perfil-email">{{ utilizador?.email }}</p>
  </div>

  <!-- Estatísticas -->
  <div class="stats-section">
    <div class="stat-card">
      <span class="stat-valor">{{ totalAvaliacoes }}</span>
      <span class="stat-label">Avaliações</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-card">
      <span class="stat-valor">
        {{ mediaEstrelas > 0 ? mediaEstrelas : '—' }}
        <ion-icon *ngIf="mediaEstrelas > 0" name="star" class="stat-star"></ion-icon>
      </span>
      <span class="stat-label">Média dada</span>
    </div>
  </div>

  <!-- Informações da conta -->
  <div class="info-section">
    <h2 class="info-titulo">Informações da conta</h2>

    <div class="info-row">
      <ion-icon name="person-outline"></ion-icon>
      <div class="info-texto">
        <span class="info-label">Nome de utilizador</span>
        <span class="info-valor">{{ utilizador?.nome }}</span>
      </div>
    </div>

    <div class="info-row">
      <ion-icon name="mail-outline"></ion-icon>
      <div class="info-texto">
        <span class="info-label">Email</span>
        <span class="info-valor">{{ utilizador?.email }}</span>
      </div>
    </div>

    <div class="info-row">
      <ion-icon name="shield-checkmark-outline"></ion-icon>
      <div class="info-texto">
        <span class="info-label">Estado da conta</span>
        <span class="info-valor estado-ativo">● Ativa</span>
      </div>
    </div>
  </div>

  <!-- Botão logout -->
<div class="logout-wrapper">
  <ion-button expand="block" (click)="logout()">
    <ion-icon slot="start" name="log-out-outline"></ion-icon>
    Logout
  </ion-button>
</div>

</ion-content>
